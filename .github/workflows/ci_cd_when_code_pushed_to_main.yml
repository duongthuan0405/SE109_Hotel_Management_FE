name: CI/CD when code pushed to main

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  checkout-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout code from main branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: ./hotel-management-fe/package-lock.json

      - name: Build and Test
        working-directory: ./hotel-management-fe
        run: |
          npm ci
          npm run build
          # npm test

  build-container-and-push-to-registry:
    runs-on: ubuntu-latest
    needs: checkout-and-build

    steps:
      - name: Checkout code from main branch
        uses: actions/checkout@v4

      - name: Sign in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        working-directory: ./hotel-management-fe
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hotel-management-fe:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/hotel-management-fe:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/hotel-management-fe:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/hotel-management-fe:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/hotel-management-fe:latest

  deploy-to-production:
    runs-on: ubuntu-latest
    needs: build-container-and-push-to-registry
    environment:
      name: production

    steps:
      - name: Deploy to production environment
        run: |
          echo "Deploying ${{ secrets.PROJECT_NAME }} to production environment..."
